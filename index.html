<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIGERNETWORK</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <div class="tn-header">
  <img src="./tigerNet.JPEG" class="tn-logo">

  <div class="tools">
    <div class="tool">□</div>
    <div class="tool">✎</div>
    <div class="tool eraser-tool"></div>
    <input type="color" class="tool color-tool">
  </div>
</div>

    <!-- ERASER: image-only, no img tag -->
    <div class="tool eraser-tool" data-tool="erase" title="Eraser"></div>

    <input
      id="colorPicker"
      type="color"
      class="tool color-tool"
      value="#000000"
      title="Fill color"
    />
  </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Cursor -->
  <img id="catCursor" src="./32.png" alt="">

  <script src="app.js" defer></script>
</body>
</html>
