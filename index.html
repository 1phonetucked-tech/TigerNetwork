<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIGERNETWORK</title>

  <!--  LOAD CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER / TITLE BACK -->
  <div class="tn-header">
    <a class="tn-logo" href="/">
      <img src="./tigernet.png" alt="TigerNet" />
    </a>
  </div>

  <!-- TOOLS -->
  <div class="tools">
    <button class="tool active" data-tool="box">□</button>
    <button class="tool" data-tool="text">T</button>
    
    <button class="tool eraser-tool" data-tool="erase" title="Eraser">
    <img src="./eraser.webp" alt="Eraser">
</button>

  
    
<input
  id="colorPicker"
  type="color"
  class="tool color-tool"
  value="#000000"
  title="Fill color"
/>

  </div>

  <!-- DRAWING SURFACE -->
  <svg id="svg"></svg>

  <!-- FAKE CURSOR -->
  <img id="catCursor" src="./32.png" alt="" />

  <script src="app.js" defer></script>

</body>
</html>
