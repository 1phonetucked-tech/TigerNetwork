<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIGERNETWORK</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <div class="tn-header">
    <img src="./tigerNet.JPEG" alt="TigerNet" class="tn-logo">
  </div>

  <!-- Toolbar -->
  <div class="tools">
    <div class="tool tool-box active" data-tool="box">□</div>
    <div class="tool tool-draw" data-tool="draw">✎</div>
    

    <!-- ERASER: image-only, no img tag -->
    <div class="tool eraser-tool" data-tool="erase" title="Eraser"></div>

    <input
      id="colorPicker"
      type="color"
      class="tool color-tool"
      value="#000000"
      title="Fill color"
    />
  </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Cursor -->
  <img id="catCursor" src="./32.png" alt="">

  <script src="app.js" defer></script>
</body>
</html>
